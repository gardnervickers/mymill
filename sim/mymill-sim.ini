# Simulator scaffold for Linux-only LinuxCNC startup checks.
# This config is intentionally hardware-free so it can run without Mesa or a pendant.

[EMC]
MACHINE = mymill-sim
DEBUG = 0
VERSION = 1.1

[DISPLAY]
DISPLAY = axis
EDITOR = gedit
GEOMETRY = XYZA
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2.00
MAX_SPINDLE_OVERRIDE = 2.0
MIN_SPINDLE_OVERRIDE = 0.5
PROGRAM_PREFIX = /home/cnc/linuxcnc/nc_files
INCREMENTS = JOG,0.01,0.1,1,10
DEFAULT_LINEAR_VELOCITY = 50
MAX_LINEAR_VELOCITY = 100
MIN_LINEAR_VELOCITY = 0.01
DEFAULT_ANGULAR_VELOCITY = 360
MAX_ANGULAR_VELOCITY = 3600
MIN_ANGULAR_VELOCITY = 0.01
CYCLE_TIME = 150
KEYBOARD_JOG = true
DEFAULT_SPINDLE_SPEED = 300

[RS274NGC]
RS274NGC_STARTUP_CODE = F10 S300 G21 G17 G40 G49 G54 G64 P.001 G80 G90 G91.1 G92.1 G94 G97 G98
PARAMETER_FILE = ../probe_basic.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
SUBROUTINE_PATH = ../subroutines:../third_party/fusion-probing/subroutines

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[HAL]
HALUI = halui
HALFILE = mymill-sim.hal

[KINS]
JOINTS = 4
KINEMATICS = trivkins coordinates=XYZA

[TRAJ]
SPINDLES = 1
AXES = 4
COORDINATES = XYZA
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 100
MAX_LINEAR_VELOCITY = 230

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = ../tool.tbl

[AXIS_X]
MAX_VELOCITY = 100
MAX_ACCELERATION = 1000
MIN_LIMIT = -0.001
MAX_LIMIT = 430

[JOINT_0]
TYPE = LINEAR
FERROR = 0.005
MIN_FERROR = 0.002
MAX_VELOCITY = 100
MAX_ACCELERATION = 1000
MIN_LIMIT = -0.001
MAX_LIMIT = 430.0
HOME = 215
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = -20
HOME_LATCH_VEL = -0.25
HOME_FINAL_VEL = 0.0
HOME_USE_INDEX = NO
HOME_SEQUENCE = 3

[AXIS_Y]
MAX_VELOCITY = 100
MAX_ACCELERATION = 1000
MIN_LIMIT = -200.0
MAX_LIMIT = 0.001

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
FERROR = 0.02
MIN_FERROR = 0.02
MAX_VELOCITY = 100
MAX_ACCELERATION = 1000
MIN_LIMIT = -200.0
MAX_LIMIT = 0.001
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 20
HOME_LATCH_VEL = 1
HOME_FINAL_VEL = 0.0
HOME_USE_INDEX = NO
HOME_SEQUENCE = 2

[AXIS_Z]
MAX_VELOCITY = 50
MAX_ACCELERATION = 400
MIN_LIMIT = -350.0
MAX_LIMIT = 0.001

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
FERROR = 0.5
MIN_FERROR = 0.05
MAX_VELOCITY = 50
MAX_ACCELERATION = 400
MIN_LIMIT = -350.0
MAX_LIMIT = 0.001
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 10
HOME_LATCH_VEL = -2.5
HOME_FINAL_VEL = 0.0
HOME_USE_INDEX = NO
HOME_SEQUENCE = 1

[AXIS_A]
MAX_VELOCITY = 180
MAX_ACCELERATION = 600
MIN_LIMIT = -999999
MAX_LIMIT = 999999

[JOINT_3]
TYPE = ANGULAR
HOME = 0.0
FERROR = 0.5
MIN_FERROR = 0.05
MAX_VELOCITY = 180
MAX_ACCELERATION = 600
MIN_LIMIT = -999999
MAX_LIMIT = 999999
HOME_OFFSET = 0.0

[SPINDLE_0]
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0
FF2 = 0
BIAS = 0
DEADBAND = 0
MAX_OUTPUT = 4250
OUTPUT_SCALE = 4250
OUTPUT_MIN_LIMIT = 0
OUTPUT_MAX_LIMIT = 4250
